<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DCM·BSURAK — 21 June Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --bg-soft: #FAF8F2;
    --bg-card: #FFFFFF;
    --bg-card-hover: #F4F1EA;
    --ink: #0F0F0F;
    --ink-soft: #4D4D4D;
    --ink-mute: #8A8A8A;
    --ink-faint: #B0AC9F;
    --line: #E5E2DC;
    --line-strong: #B8B3A8;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;

    /* sparing accent — used in section heading highlights, link icons,
       drop caps, and small markers only. No filled colour blocks. */
    --accent: #FF2E9A;

    /* per-module accents — restrained, used only for small markers
       (overlay name line, link icon hover) NOT as card backgrounds */
    --c-pink:   #FF2E9A;
    --c-cyan:   #0095C5;
    --c-violet: #8B2FFF;
    --c-orange: #FF5500;
    --c-green:  #00C265;
    --c-yellow: #C99500;
    --c-blue:   #3D5BFF;
    --c-magenta:#E0008E;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-mono); font-size: 14px; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img { display: block; }

  /* ============================================================
     TOPBAR
     ============================================================ */
  header.topbar {
    position: sticky; top: 0;
    z-index: 100;
    padding: 14px 60px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand {
    font-family: var(--font-display); font-weight: 700;
    font-size: 16px; letter-spacing: -0.01em;
    cursor: pointer; color: var(--ink);
  }
  .brand span { color: var(--accent); }

  /* SCROLL-TO-TOP — floating button vertically aligned with the music
     button (same right offset as the topbar's right padding). Hidden by
     default; appears with a fade once the user has scrolled past 50% of
     the viewport. Sits at the bottom-right of the screen. */
  .scroll-top-fab {
    position: fixed;
    bottom: 28px;
    right: 60px;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid var(--ink);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s, background 0.15s, color 0.15s;
  }
  .scroll-top-fab.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .scroll-top-fab::after {
    content: '↑';
    font-size: 18px; line-height: 1;
    font-weight: 700;
  }
  .scroll-top-fab:hover { background: var(--ink); color: #FFFFFF; }
  @media (max-width: 700px) {
    .scroll-top-fab { right: 22px; bottom: 22px; width: 32px; height: 32px; }
  }

  /* ============================================================
     HERO — clean typographic. NO STUDS ghost word.
     ============================================================ */
  /* HERO — white, compact. Titles sit high; ~30% shorter than first
     pass. Top padding aggressively reduced to lift the eyebrow up. */
  .hero {
    position: relative;
    padding: 44px 60px 60px;
    background: var(--bg);
    overflow: hidden;
  }
  .hero .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.24em;
    color: var(--ink-mute); text-transform: uppercase;
    margin-bottom: 20px;
  }
  .hero .eyebrow .bracket { color: var(--ink-faint); }
  .hero h1 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(44px, 7vw, 108px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin: 0 0 20px;
    max-width: 1400px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero .tagline {
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(17px, 1.4vw, 22px);
    color: var(--ink-soft);
    line-height: 1.4;
    margin: 0;
  }
  /* Marquee — gray strip below the white hero. Borders kept subtle
     since the colour shift already provides visual separation. */
  .hero-marquee {
    background: #E8EAEE;
    border-top: 1px solid rgba(0,0,0,0.04);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    padding: 18px 0;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-soft); letter-spacing: 0.22em;
    text-transform: uppercase;
    overflow: hidden;
    white-space: nowrap;
  }
  .hero-marquee .track {
    display: inline-block;
    animation: scroll 40s linear infinite;
    padding-right: 60px;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ============================================================
     WHY DCM SECTION — Q&A framing
     ============================================================ */
  .why-section {
    padding: 100px 60px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .why-section .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.24em;
    color: var(--accent); text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 22px;
  }
  .why-section h2 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(40px, 5.2vw, 76px);
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin: 0 0 50px;
    max-width: 1500px;
    color: var(--ink);
  }
  .why-section h2 .accent { color: var(--accent); }
  /* Why DCM body — 3 equal columns filling the full available width
     inside the section's 60px padding. No max-width cap. */
  .why-section .body {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
  }
  .why-section .body p {
    font-family: var(--font-display);
    font-size: 17px; line-height: 1.65;
    color: var(--ink-soft);
    margin: 0;
  }
  .why-section .body p strong {
    color: var(--ink); font-weight: 700;
  }

  /* ============================================================
     SECTION SHELL — used by all content sections
     ============================================================ */
  .section { padding: 90px 60px; border-bottom: 1px solid var(--line); }
  .section.tinted { background: var(--bg-soft); }
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px; margin-bottom: 50px; flex-wrap: wrap;
  }
  .section-header h2 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(40px, 5vw, 72px);
    margin: 0; letter-spacing: -0.025em; line-height: 1;
    color: var(--ink);
  }
  .section-header h2 .accent { color: var(--accent); }
  .section-header .meta {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-mute); letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* ============================================================
     SHOWCASE — Best of Last Semester (videos)
     ============================================================ */
  .showcase-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  .showcase {
    background: var(--bg-card);
    border: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .showcase:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px -12px rgba(0,0,0,0.14);
    border-color: var(--line-strong);
  }
  .showcase .featured {
    position: relative; aspect-ratio: 16 / 9;
    background: #000; overflow: hidden;
  }
  .showcase .featured img { width: 100%; height: 100%; object-fit: cover; opacity: 0.92; transition: transform 0.5s; }
  .showcase:hover .featured img { transform: scale(1.04); }
  .showcase .featured::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85));
    pointer-events: none; z-index: 1;
  }
  .showcase .featured .play {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
    transition: background 0.2s;
  }
  .showcase:hover .featured .play { background: #FFFFFF; }
  .showcase .featured .play::after {
    content: '';
    border-left: 14px solid var(--c, var(--accent));
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 4px;
  }
  .showcase .featured .overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 18px 14px; z-index: 2;
    pointer-events: none;
  }
  .showcase .featured .overlay .marker {
    display: block; width: 28px; height: 3px;
    background: var(--c, var(--accent));
    margin-bottom: 8px;
  }
  .showcase .featured .overlay .name {
    color: white; font-family: var(--font-display);
    font-weight: 700; font-size: 17px;
    letter-spacing: -0.01em; line-height: 1.2;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* link button (still optional, small, neutral) */
  .link-btn {
    position: absolute;
    top: 12px; right: 12px;
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.92);
    color: var(--c, var(--accent));
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .link-btn:hover { background: var(--c, var(--accent)); color: white; text-decoration: none; }
  .link-btn svg { width: 13px; height: 13px; }
  /* Smaller link icon on mini thumbs */
  .link-btn.mini-link {
    top: 6px; right: 6px;
    width: 22px; height: 22px;
  }
  .link-btn.mini-link svg { width: 10px; height: 10px; }
  .showcase .mod {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
  }
  .showcase .mod .mname {
    font-family: var(--font-display); font-weight: 700;
    font-size: 22px; color: var(--ink);
    letter-spacing: -0.015em;
  }
  .showcase .mod .tutor {
    margin-top: 5px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-mute);
  }
  .showcase .strip {
    padding: 14px 20px 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .showcase .strip .mini-card {
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
  }
  .showcase .strip .mini {
    position: relative; background: #000;
    aspect-ratio: 16/9; overflow: hidden;
    border: 1px solid var(--line);
  }
  .showcase .strip .mini img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.2s; }
  .showcase .strip .mini-card:hover .mini img { opacity: 1; }
  .showcase .strip .mini-name {
    font-family: var(--font-display); font-weight: 600;
    font-size: 11px; color: var(--ink);
    letter-spacing: -0.005em;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .showcase .strip .mini-card.empty { cursor: default; pointer-events: none; }
  .showcase .strip .mini-card.empty .mini { background: transparent; border-style: dashed; }
  .showcase .strip .mini-card.empty .mini-name { visibility: hidden; }
  .showcase .view-all {
    margin-top: auto; padding: 14px 20px;
    border-top: 1px solid var(--line);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 600;
    display: flex; justify-content: space-between;
  }

  /* ============================================================
     POST CARDS — neutral, no colour blocks, just outlines
     ============================================================ */
  .posts-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .post-card {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--line);
    overflow: hidden;
    cursor: pointer;
    display: flex; flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .post-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px -12px rgba(0,0,0,0.14);
    border-color: var(--line-strong);
  }
  .post-card .cover {
    position: relative; aspect-ratio: 16/9;
    background: #000; overflow: hidden;
  }
  .post-card .cover img { width: 100%; height: 100%; object-fit: cover; opacity: 0.92; transition: transform 0.5s; }
  .post-card:hover .cover img { transform: scale(1.04); }
  .post-card .cover::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85));
    pointer-events: none; z-index: 1;
  }
  .post-card .type-badge {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.92);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 9px;
    z-index: 2;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .post-card .type-badge .count {
    color: var(--ink-mute);
    padding-left: 5px; margin-left: 4px;
    border-left: 1px solid var(--ink-faint);
  }
  .post-card .play-marker {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .post-card .play-marker::after {
    content: '';
    border-left: 13px solid var(--accent);
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    margin-left: 3px;
  }
  .post-card .cover .overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 16px 14px; z-index: 2;
    pointer-events: none;
  }
  .post-card .cover .overlay .h {
    color: #FFFFFF;
    font-family: var(--font-display); font-weight: 700;
    font-size: 16px; letter-spacing: -0.01em;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .post-card .meta-row {
    padding: 14px 16px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-mute); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .post-card .meta-row .author {
    color: var(--ink); font-weight: 600; letter-spacing: 0;
    text-transform: none; font-family: var(--font-display);
    font-size: 12px;
  }

  /* TEXT/READ post variant — NEUTRAL, no colour. Just clean type. */
  .post-card.text-post {
    background: var(--bg-card);
  }
  .post-card.text-post .text-body {
    padding: 24px 20px 18px;
    flex: 1; display: flex; flex-direction: column;
  }
  .post-card.text-post .type-badge-static {
    align-self: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 9px;
    margin-bottom: 18px;
  }
  .post-card.text-post .text-body .h {
    font-family: var(--font-display); font-weight: 700;
    font-size: 22px; letter-spacing: -0.015em; line-height: 1.15;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .post-card.text-post .text-body .excerpt {
    flex: 1;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-soft); line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .post-card.text-post .text-body .read {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    font-weight: 600; margin-top: 16px;
    color: var(--accent);
  }
  .post-card.text-post .meta-row {
    border-top: 1px solid var(--line);
  }

  /* ============================================================
     FILTER CHIPS
     ============================================================ */
  .filter-chips {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }
  .chip {
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--ink-soft);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active {
    background: var(--ink); color: var(--bg);
    border-color: var(--ink); font-weight: 600;
  }
  .chip .num { margin-left: 8px; opacity: 0.55; font-weight: 600; }

  /* ============================================================
     MODULE NAV CARDS
     ============================================================ */
  .module-nav-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }
  .module-card {
    padding: 22px 24px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    cursor: pointer;
    display: flex; align-items: center;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    text-decoration: none;
  }
  .module-card:hover {
    transform: translateX(4px);
    border-color: var(--ink);
    background: var(--bg-soft);
  }
  .module-card .name {
    font-family: var(--font-display); font-weight: 700;
    font-size: 19px; color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.15;
  }

  /* ============================================================
     FOOTER
     ============================================================ */
  footer {
    padding: 50px 60px;
    color: var(--ink-mute);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  footer .contact { color: var(--ink); }
  footer .sep { color: var(--ink-faint); margin: 0 8px; }

  /* ============================================================
     ARTICLE PAGE — full post view
     Cover: full width, fixed height (your spec)
     Body: same 60px margins as the rest of the site
     ============================================================ */
  .article-shell {
    background: var(--bg);
  }
  .article-nav {
    padding: 24px 60px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-soft); letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .article-nav .back {
    color: var(--accent); font-weight: 600; cursor: pointer;
  }
  .article-nav .back:hover { text-decoration: underline; }

  /* COVER — full viewport width, fixed height. Site already places
     this without surrounding padding so it bleeds edge-to-edge. */
  .article-cover {
    position: relative;
    width: 100%;
    height: clamp(380px, 56vh, 560px);
    overflow: hidden;
    background: #000;
  }
  .article-cover img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* HEAD — sits inside the standard 60px section padding */
  .article-head {
    padding: 70px 60px 36px;
    border-bottom: 1px solid var(--line);
  }
  .article-head .meta-line {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
    margin-bottom: 24px;
  }
  .article-head h1 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(40px, 6vw, 84px);
    margin: 0 0 30px;
    letter-spacing: -0.025em; line-height: 1.02;
    color: var(--ink);
  }
  .article-head .accent-line {
    display: block; width: 60px; height: 3px;
    background: var(--accent); margin-bottom: 26px;
  }
  .article-head .byline {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-soft); letter-spacing: 0.08em;
  }
  .article-head .byline strong {
    color: var(--ink); font-weight: 700;
    font-family: var(--font-display); font-size: 15px; letter-spacing: 0;
  }

  /* BODY — same 60px site margins, text flows in 3 columns
     (newspaper feel) to fill the full gallery width below. */
  .article-body {
    padding: 50px 60px 60px;
    border-bottom: 1px solid var(--line);
    font-family: var(--font-display);
    font-size: 17px; line-height: 1.65;
    color: var(--ink-soft);
  }
  .article-body .body-inner {
    column-count: 3;
    column-gap: 50px;
    column-fill: balance;
  }
  .article-body p { margin: 0 0 18px; }
  .article-body p:first-of-type::first-letter {
    font-family: var(--font-display); font-weight: 900;
    font-size: 60px; line-height: 0.85;
    float: left; padding: 4px 8px 0 0;
    color: var(--accent);
  }
  .article-body strong { color: var(--ink); font-weight: 700; }
  .article-body em { font-style: italic; }
  .article-body a { color: var(--accent); border-bottom: 1px solid currentColor; }
  .article-body a:hover { text-decoration: none; opacity: 0.85; }
  .article-body ul {
    padding-left: 20px;
    margin: 0 0 18px;
    break-inside: avoid;     /* don't split lists across columns */
  }
  .article-body li { margin-bottom: 8px; }
  .article-body h3 {
    font-family: var(--font-display); font-weight: 700;
    font-size: 22px; letter-spacing: -0.015em;
    color: var(--ink);
    margin: 28px 0 12px;
    break-after: avoid;       /* keep heading with next paragraph */
  }

  /* GALLERY — same 60px site margins */
  .article-gallery {
    padding: 60px;
    border-bottom: 1px solid var(--line);
  }
  .article-gallery h3 {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--accent); font-weight: 700;
    margin: 0 0 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .article-gallery h3::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  .gallery-grid .gi {
    position: relative; aspect-ratio: 1 / 1;
    background: #000; overflow: hidden; cursor: pointer;
    border: 1px solid var(--line);
  }
  .gallery-grid .gi img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s;
  }
  .gallery-grid .gi:hover img { transform: scale(1.05); }
  .gallery-grid .gi:first-child {
    grid-column: span 2; grid-row: span 2;
  }
  .article-foot {
    text-align: center; padding: 50px 60px 60px;
  }
  .article-foot a {
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.22em; text-transform: uppercase;
    font-weight: 600; color: var(--accent);
    display: inline-flex; align-items: center; gap: 16px;
  }


  /* ============================================================
     MODULE PAGE (brick gallery for one module + semester)
     ============================================================ */
  .module-page {
    background: var(--bg);
  }
  .module-nav-row {
    padding: 22px 60px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-soft); letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .module-nav-row .back {
    color: var(--accent); font-weight: 600; cursor: pointer;
  }
  .module-nav-row .back:hover { text-decoration: underline; }
  .module-hero {
    padding: 70px 60px 60px;
    border-bottom: 1px solid var(--line);
  }
  .module-hero .meta-line {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
    margin-bottom: 22px;
  }
  .module-hero h1 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(48px, 7vw, 108px);
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0 0 18px;
  }
  /* Module tagline — short value-prop line from the sheet, sits between
     the module name and the meta row (tutor/semester/projects). */
  .module-hero .module-tagline {
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(18px, 1.6vw, 26px);
    color: var(--ink-soft);
    line-height: 1.35;
    margin: 0 0 28px;
    max-width: 900px;
  }
  .module-hero .module-meta-row {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-mute); letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .module-hero .module-meta-row strong {
    color: var(--ink); font-weight: 600;
  }
  .semester-section { padding: 70px 60px; border-bottom: 1px solid var(--line); }
  .sem-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px; margin-bottom: 36px; flex-wrap: wrap;
  }
  .sem-head h2 {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(28px, 3vw, 40px);
    margin: 0; letter-spacing: -0.015em; line-height: 1.1;
    color: var(--ink);
  }
  .sem-head h2 .accent { color: var(--accent); }
  .sem-head .sem-meta {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-mute); letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  /* Module videos — CSS-columns masonry. 16:9 thumbnails; cards flow
     top-to-bottom in each column. Matches the article gallery so the
     layout language is consistent across the site. */
  .masonry {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
  }
  .masonry-card {
    position: relative;
    background: transparent;
    overflow: hidden;
    cursor: pointer;
    width: 100%;
  }
  .masonry-card .v-thumb {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
  }
  .masonry-card .v-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s;
  }
  .masonry-card:hover .v-thumb img { transform: scale(1.04); }
  .masonry-card .v-thumb .v-play {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .masonry-card .v-thumb .v-play::after {
    content: '';
    border-left: 13px solid var(--c, var(--accent));
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 3px;
  }
  .masonry-card .v-name {
    padding: 12px 4px 0;
    font-family: var(--font-display); font-weight: 600;
    font-size: 13px; color: var(--ink);
    letter-spacing: -0.005em; line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Responsive: 4 cols on desktop, 3 cols on laptop/tablet landscape, 2 cols on tablet portrait/phone */
  @media (max-width: 1300px) {
    .masonry { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 900px) {
    .masonry { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  }
  @media (max-width: 700px) {
    .masonry { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .module-nav-row { padding: 18px 22px; }
    .module-hero { padding: 40px 22px 30px; }
    .semester-section { padding: 40px 22px; }
  }

  /* ============================================================
     LIGHTBOX (simple)
     ============================================================ */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.94);
    display: none; align-items: center; justify-content: center;
    padding: 60px;
  }
  .lightbox.open { display: flex; }
  .lightbox .lb-content {
    position: relative;
    width: 100%; max-width: 1200px;
    aspect-ratio: 16/9;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    color: white; font-family: var(--font-display);
    font-size: 20px;
  }
  /* Make the inner host fill the content box so iframes and carousel
     images can size themselves to 100% reliably. */
  .lightbox #lb-host {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }
  .lightbox.carousel-mode #lb-host {
    position: relative;
    display: block;
    width: auto; height: auto;
  }
  /* Carousel mode — image fits naturally, no aspect lock, no bg */
  .lightbox.carousel-mode .lb-content {
    aspect-ratio: unset;
    background: transparent;
    max-width: 90vw; max-height: 85vh;
    width: auto; height: auto;
  }
  .lightbox.carousel-mode .lb-content img {
    max-width: 90vw; max-height: 85vh;
    width: auto; height: auto;
    display: block; object-fit: contain;
  }
  .lightbox .lb-close {
    position: fixed; top: 22px; right: 30px;
    background: none; border: none;
    color: white; font-size: 30px;
    cursor: pointer; line-height: 1;
    z-index: 10;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .lightbox .lb-close:hover { opacity: 0.7; }
  .lightbox .lb-caption {
    position: fixed; bottom: 28px; left: 0; right: 0;
    text-align: center;
    color: white; opacity: 0.7;
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  /* Prev/Next nav — only shown in carousel mode */
  .lb-nav {
    position: fixed; top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    width: 52px; height: 52px;
    cursor: pointer; z-index: 10;
    display: none;
    align-items: center; justify-content: center;
    font-size: 22px;
    transition: background 0.15s;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.18); }
  .lightbox.carousel-mode .lb-nav { display: flex; }
  .lb-prev { left: 24px; }
  .lb-next { right: 24px; }
  @media (max-width: 700px) {
    .lightbox { padding: 24px; }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
    .lb-nav { width: 42px; height: 42px; }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 1400px) {
    .showcase-grid { grid-template-columns: repeat(2, 1fr); }
    .posts-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 1100px) {
    .why-section .body { grid-template-columns: 1fr 1fr; gap: 32px; }
    .posts-grid { grid-template-columns: repeat(2, 1fr); }
    .module-nav-grid { grid-template-columns: repeat(2, 1fr); }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); }
    .article-body .body-inner { column-count: 2; column-gap: 36px; }
  }
  @media (max-width: 700px) {
    header.topbar { padding: 12px 22px; }
    .why-section .body { grid-template-columns: 1fr; gap: 24px; }
    /* 75% of the desktop minimum (40px → 30px) so the heading sits comfortably on phone */
    .why-section h2 { font-size: 30px; margin: 0 0 36px; }
    .hero { padding: 60px 22px 50px; }
    .hero .marquee { margin: 0 -22px; }
    .why-section { padding: 60px 22px; }
    .section { padding: 60px 22px; }
    .showcase-grid, .posts-grid, .module-nav-grid {
      grid-template-columns: 1fr; gap: 16px;
    }
    .article-nav { padding: 18px 22px; }
    .article-cover { height: clamp(220px, 45vh, 380px); }
    .article-head { padding: 40px 22px 28px; }
    .article-body { padding: 36px 22px 40px; font-size: 16px; }
    .article-body .body-inner { column-count: 1; }
    .article-gallery { padding: 40px 22px; }
    .article-foot { padding: 40px 22px 50px; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    .gallery-grid .gi:first-child { grid-column: span 2; grid-row: span 2; }
    footer { padding: 40px 22px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand" onclick="navigateTo('home')">DCM<span>·</span>BSURAK</div>
</header>

<!-- Floating scroll-to-top, visible after 50% scroll -->
<div class="scroll-top-fab" id="scroll-top-fab" title="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})"></div>

<main id="app"></main>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox(event)" aria-label="Close">✕</button>
  <button class="lb-nav lb-prev" onclick="carouselPrev(event)" aria-label="Previous">←</button>
  <button class="lb-nav lb-next" onclick="carouselNext(event)" aria-label="Next">→</button>
  <div class="lb-content" onclick="event.stopPropagation()">
    <div id="lb-host">▶ Video player placeholder</div>
  </div>
  <div class="lb-caption" id="lb-caption"></div>
</div>

<script>
  // =================================================================
  // MOCK DATA — modules with videos, posts with mixed types,
  // one full article for previewing the article page
  // =================================================================
  // ============================================================
  // SITE data loader — paste your Apps Script /exec URL below.
  // ============================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKV1Dm2EFzZrfdHPh-Fn3DsgrcLfrJKAXKq1LzyOb6AtpavbXvp1KgtT6vR969QBdO/exec';
  let SITE = null;
  let LOAD_ERROR = null;
  let LOAD_ERROR_WHERE = null;

  async function loadSiteData() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('PASTE') === 0) {
      LOAD_ERROR = 'Apps Script URL not set in index.html (line near the top of the script block).';
      renderRoute();
      return;
    }
    try {
      const res = await fetch(APPS_SCRIPT_URL, { method: 'GET' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data && data.error) {
        LOAD_ERROR_WHERE = data.where || null;
        throw new Error(data.error);
      }
      SITE = data;
      renderRoute();
    } catch (err) {
      LOAD_ERROR = err.message || String(err);
      renderRoute();
    }
  }


  // ============================================================
  // SCROLL MEMORY — when user clicks "back" they land exactly
  // where they diverged from. Works for in-page back links AND
  // the browser back/forward buttons.
  // ============================================================
  if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
  }
  // Scroll memory persists in sessionStorage so it survives if the
  // page rebuilds DOM on hashchange. Keyed by hash.
  function scrollKey_() { return 'dcm-scroll-' + (window.location.hash || ''); }
  function saveScroll_() {
    try { sessionStorage.setItem(scrollKey_(), String(window.scrollY)); } catch (e) {}
  }
  function loadScroll_(hash) {
    try {
      const v = sessionStorage.getItem('dcm-scroll-' + (hash || ''));
      return v == null ? null : Number(v);
    } catch (e) { return null; }
  }
  // Debounced scroll saver — fires on every scroll, persists position
  // for the current route. This means we don't depend on hashchange
  // firing in the right order on mobile (which is flaky in some browsers).
  let scrollSaveTimer = null;
  window.addEventListener('scroll', function() {
    if (scrollSaveTimer) clearTimeout(scrollSaveTimer);
    scrollSaveTimer = setTimeout(saveScroll_, 150);
  }, { passive: true });
  // Also save right before page hides (in case user closes/switches tab)
  window.addEventListener('pagehide', saveScroll_);
  let previousHash = window.location.hash;

  // ============================================================
  // CONFIG HELPERS — parse {accent} markup, \n line breaks, etc
  // ============================================================
  function cfgEscape(s) { return String(s == null ? '' : s)
    .replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }

  function renderConfigHeading(text) {
    // Replaces {word} with accented span, and \n with <br>
    if (!text) return '';
    let s = cfgEscape(text);
    s = s.replace(/\{([^}]+)\}/g, '<span class="accent">$1</span>');
    s = s.replace(/\\n/g, '<br>');
    s = s.replace(/\n/g, '<br>');
    return s;
  }


  function updateBrand(cfg) {
    const el = document.querySelector('.brand');
    if (el && cfg) el.innerHTML = brandHtml(cfg);
  }

  function brandHtml(cfg) {
    const pre  = cfgEscape(cfg.site_brand_pre  || 'DCM');
    const sep  = cfgEscape(cfg.site_brand_sep  || '·');
    const post = cfgEscape(cfg.site_brand_post || 'BSURAK');
    return pre + '<span>' + sep + '</span>' + post;
  }

  // =================================================================
  // ROUTING
  // =================================================================
  let currentFilter = 'all';

  function navigateTo(route, arg) {
    // Don't scroll here — hashchange handler saves scroll, renderRoute
    // either restores the saved position or scrolls to top of new page.
    if (route === 'home') window.location.hash = '';
    else if (route === 'post') window.location.hash = 'post=' + arg;
    else if (route === 'module') window.location.hash = 'module=' + encodeURIComponent(arg);
  }

  function currentRoute() {
    const h = window.location.hash.slice(1);
    if (h.startsWith('post=')) return { type: 'post', slug: h.slice(5) };
    if (h.startsWith('module=')) return { type: 'module', name: decodeURIComponent(h.slice(7)) };
    return { type: 'home' };
  }

  function renderRoute() {
    if (!SITE && !LOAD_ERROR) { renderHome(); return; }
    if (LOAD_ERROR) { renderHome(); return; }
    const r = currentRoute();
    if (r.type === 'post') {
      const post = SITE.posts && SITE.posts.find(p => p.slug === r.slug);
      if (post) renderArticle(post);
      else renderHome();
    } else if (r.type === 'module') {
      // Try moduleFull first (full semester data), then modules (home data),
      // then allModules (just the name + tab — minimal empty page so the
      // click lands somewhere meaningful even if data is incomplete).
      const fullMod = SITE.moduleFull && SITE.moduleFull[r.name];
      const homeMod = SITE.modules    && SITE.modules.find(m => m.tab_name === r.name);
      const allMod  = SITE.allModules && SITE.allModules.find(m => m.tab_name === r.name);
      const mod = fullMod || homeMod || (allMod
        ? { tab_name: allMod.tab_name, display_name: allMod.display_name, tagline: '', color: '#FF2E9A', tutor: '', semesters: [] }
        : null);
      if (mod) renderModule(mod);
      else renderHome();
    } else {
      renderHome();
    }
    restoreScrollOrTop_();
  }

  function restoreScrollOrTop_() {
    const saved = loadScroll_(window.location.hash || '');
    if (saved == null || saved < 1) {
      window.scrollTo(0, 0);
      return;
    }
    // Poll up to 3 seconds for the page to grow tall enough. Images
    // (Drive thumbs, YouTube covers) load async; on a slow phone
    // connection they can take a couple of seconds.
    const target = saved;
    const startTime = Date.now();
    function attempt() {
      const maxScroll = Math.max(0,
        document.documentElement.scrollHeight - window.innerHeight);
      if (maxScroll >= target) {
        window.scrollTo(0, target);
        return;
      }
      if (Date.now() - startTime > 3000) {
        // Give up after 3s; scroll to whatever we have
        window.scrollTo(0, target);
        return;
      }
      setTimeout(attempt, 60);
    }
    attempt();
  }

  window.addEventListener('hashchange', function () {
    // Save the scroll position of the page we just left, then navigate.
    // We use sessionStorage directly with the previous hash key so the
    // save survives this teardown.
    try { sessionStorage.setItem('dcm-scroll-' + (previousHash || ''), String(window.scrollY)); } catch (e) {}
    previousHash = window.location.hash;
    renderRoute();
  });

  // =================================================================
  // HOME PAGE
  // =================================================================
  function renderHome() {
    if (LOAD_ERROR) {
      document.getElementById('app').innerHTML = '<div style="padding:120px 60px;text-align:center;font-family:var(--font-display);color:var(--ink-soft)"><div style="font-size:42px;font-weight:900;color:var(--ink);margin-bottom:18px;letter-spacing:-0.02em">Site data could not load.</div><div style="font-size:14px;font-family:var(--font-mono);color:var(--ink-mute);letter-spacing:0.1em">' + escapeHtml(LOAD_ERROR) + '</div>' + (LOAD_ERROR_WHERE ? '<div style="margin-top:14px;font-size:11px;font-family:var(--font-mono);color:var(--ink-faint);letter-spacing:0.1em;max-width:900px;margin-left:auto;margin-right:auto;word-break:break-all">' + escapeHtml(LOAD_ERROR_WHERE) + '</div>' : '') + '<div style="margin-top:30px;font-size:11px;font-family:var(--font-mono);color:var(--ink-mute);letter-spacing:0.16em;text-transform:uppercase">Check the Apps Script URL in index.html and the sheet permissions.</div></div>';
      return;
    }
    if (!SITE) {
      document.getElementById('app').innerHTML = '<div style="padding:160px 60px;text-align:center;font-family:var(--font-mono);color:var(--ink-mute);font-size:11px;letter-spacing:0.24em;text-transform:uppercase">Loading…</div>';
      return;
    }
    const cfg = SITE.config;
    updateBrand(cfg);
    const featuredPosts = SITE.posts.filter(p => p.featured).slice(0, 4);
    const allPosts = filterPosts(currentFilter);
    const counts = {
      all: SITE.posts.length,
      photo: SITE.posts.filter(p => p.type === 'photo').length,
      story: SITE.posts.filter(p => p.type === 'story').length,
      text: SITE.posts.filter(p => p.type === 'text').length
    };

    document.getElementById('app').innerHTML = [
      // HERO — all text from cfg
      '<section class="hero">',
      '  <div class="eyebrow">' + cfgEscape(cfg.hero_eyebrow || '') + '</div>',
      '  <h1>' + renderConfigHeading(cfg.hero_h1 || 'Dept of {Computing}\n& Media') + '</h1>',
      '  <p class="tagline">' + cfgEscape(cfg.hero_tagline || '') + '</p>',
      '</section>',
      '<div class="hero-marquee"><span class="track">' + cfgEscape((cfg.marquee_text || '') + ' ' + (cfg.marquee_text || '')) + '</span></div>',

      // WHY section
      '<section class="why-section">',
      '  <div class="eyebrow">' + cfgEscape(cfg.why_eyebrow || 'Why study here') + '</div>',
      '  <h2>' + renderConfigHeading(cfg.why_h2 || '') + '</h2>',
      '  <div class="body">',
      '    <p>' + markdownInline(cfg.why_body1 || cfg.whyBody1 || '') + '</p>',
      '    <p>' + markdownInline(cfg.why_body2 || cfg.whyBody2 || '') + '</p>',
      '    <p>' + markdownInline(cfg.why_body3 || cfg.whyBody3 || '') + '</p>',
      '  </div>',
      '</section>',

      // BEST OF LAST SEMESTER (videos)
      '<section class="section">',
      '  <div class="section-header">',
      '    <h2>Best of <span class="accent">Last Semester</span></h2>',
      '    <div class="meta">' + cfg.current_semester + ' · ' + SITE.modules.length + ' modules</div>',
      '  </div>',
      '  <div class="showcase-grid">',
      SITE.modules.map(showcaseHtml).join(''),
      '  </div>',
      '</section>',

      // LATEST AT OUR DEPT (department posts only, featured first, 4 cards)
      '<section class="section tinted">',
      '  <div class="section-header">',
      '    <h2>Latest at our <span class="accent">Dept</span></h2>',
      '    <div class="meta">Department news, photos &amp; stories</div>',
      '  </div>',
      '  <div class="posts-grid">',
      featuredPosts.map(postCardHtml).join(''),
      '  </div>',
      '</section>',

      // ALL POSTS archive with filter chips
      '<section class="section" id="posts-section">',
      '  <div class="section-header">',
      '    <h2>All <span class="accent">Posts</span></h2>',
      '    <div class="meta">' + counts.all + ' posts · filter by type</div>',
      '  </div>',
      '  <div class="filter-chips">',
      '    <div class="chip ' + (currentFilter === 'all' ? 'active' : '') + '" onclick="setFilter(\'all\')">All <span class="num">' + counts.all + '</span></div>',
      '    <div class="chip ' + (currentFilter === 'photo' ? 'active' : '') + '" onclick="setFilter(\'photo\')">Photos <span class="num">' + counts.photo + '</span></div>',
      '    <div class="chip ' + (currentFilter === 'story' ? 'active' : '') + '" onclick="setFilter(\'story\')">Stories <span class="num">' + counts.story + '</span></div>',
      '    <div class="chip ' + (currentFilter === 'text' ? 'active' : '') + '" onclick="setFilter(\'text\')">Reads <span class="num">' + counts.text + '</span></div>',
      '  </div>',
      '  <div class="posts-grid">',
      allPosts.map(postCardHtml).join(''),
      '  </div>',
      '</section>',

      // ALL MODULES
      '<section class="section">',
      '  <div class="section-header">',
      '    <h2>All <span class="accent">Modules</span></h2>',
      '    <div class="meta">' + SITE.allModules.length + ' modules · pick one to explore</div>',
      '  </div>',
      '  <div class="module-nav-grid">',
      SITE.allModules.map(function(m) {
        var name = m.display_name || m.tab_name || m.name || '';
        var tab  = m.tab_name || m.display_name || m.name || '';
        return '<div class="module-card" onclick="navigateTo(\'module\',\'' + escapeJs(tab) + '\')">'
          + '<div class="name">' + escapeHtml(name) + '</div>'
          + '</div>';
      }).join(''),
      '  </div>',
      '</section>',

      // FOOTER — centred single-line
      '<footer>',
      '  ' + escapeHtml(cfg.footer_text) + ' <span class="sep">|</span> <span class="contact">' + escapeHtml(cfg.footer_contact) + '</span>',
      '</footer>'
    ].join('');
  }

  function filterPosts(filter) {
    if (filter === 'all') return SITE.posts;
    return SITE.posts.filter(p => p.type === filter);
  }

  function setFilter(filter) {
    currentFilter = filter;
    renderHome();
    // Scroll to All Posts. The DOM was just rebuilt and images load
    // async on mobile, so the section's Y position shifts as images
    // load. Smooth-scroll first (good UX), then snap-correct after
    // a delay to ensure we end up exactly at the section.
    function postsY() {
      const el = document.getElementById('posts-section');
      if (!el) return null;
      const r = el.getBoundingClientRect();
      return r.top + window.scrollY - 20;  // 20px breathing room above
    }
    requestAnimationFrame(function() {
      const y1 = postsY();
      if (y1 != null) window.scrollTo({ top: y1, behavior: 'smooth' });
      // 800ms later, recompute and snap to correct any image-load shifts
      setTimeout(function() {
        const y2 = postsY();
        if (y2 != null) window.scrollTo({ top: y2, behavior: 'auto' });
      }, 800);
    });
  }

  // =================================================================
  // SHOWCASE CARD — video module showcase. NO pos-tag, NO views.
  // =================================================================
  function showcaseHtml(module) {
    // If a module has no videos at all yet, render a minimal empty card
    if (!module || !module.featured) {
      return [
        '<div class="showcase" style="--c:' + (module && module.color || 'var(--accent)') + '">',
        '  <div class="featured" style="display:flex;align-items:center;justify-content:center;background:var(--bg-soft);color:var(--ink-mute);font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase">No videos yet</div>',
        '  <div class="mod" onclick="navigateTo(\'module\',\'' + escapeJs((module && module.tab_name) || '') + '\')">',
        '    <div class="mname">' + escapeHtml((module && module.display_name) || '') + '</div>',
        '    <div class="tutor">' + escapeHtml((module && module.tutor) || '') + '</div>',
        '  </div>',
        '</div>'
      ].join('');
    }
    const featLink = module.featured.link
      ? '<a class="link-btn" href="' + escapeAttr(module.featured.link) + '" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="Visit project">' + linkSvg + '</a>'
      : '';
    return [
      '<div class="showcase" style="--c:' + module.color + '">',
      '  <div class="featured" onclick="openLightbox(\'' + escapeJs((module.featured && module.featured.youtube) || '') + '\',\'' + escapeJs((module.featured && module.featured.student) || '') + ' · ' + escapeJs(module.display_name) + '\')">',
      '    ' + featLink,
      '    <img src="' + module.featured.thumb + '" alt="" loading="lazy">',
      '    <div class="play"></div>',
      '    <div class="overlay">',
      '      <span class="marker"></span>',
      '      <span class="name">' + escapeHtml(module.featured.student) + '</span>',
      '    </div>',
      '  </div>',
      '  <div class="mod" onclick="navigateTo(\'module\',\'' + escapeJs(module.tab_name) + '\')">',
      '    <div class="mname">' + escapeHtml(module.display_name) + '</div>',
      '    <div class="tutor">' + escapeHtml(module.tutor) + '</div>',
      '  </div>',
      '  <div class="strip">',
      module.minis.map(function(m) {
        var miniLink = m.link
          ? '<a class="link-btn mini-link" href="' + escapeAttr(m.link) + '" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="Visit project">' + linkSvg + '</a>'
          : '';
        return '<div class="mini-card" onclick="openLightbox(\'' + escapeJs(m.youtube || '') + '\',\'' + escapeJs(m.student) + ' · ' + escapeJs(module.display_name) + '\')"><div class="mini">' + miniLink + '<img src="' + m.thumb + '" alt=""></div><div class="mini-name">' + escapeHtml(m.student) + '</div></div>';
      }).join(''),
      Array(Math.max(0, 3 - module.minis.length)).fill('<div class="mini-card empty"><div class="mini"></div><div class="mini-name">·</div></div>').join(''),
      '  </div>',
      '  <div class="view-all" onclick="navigateTo(\'module\',\'' + escapeJs(module.tab_name) + '\')"><span>View all ' + (module.total_projects || (module.minis.length + 1)) + ' projects</span><span>→</span></div>',
      '</div>'
    ].join('');
  }

  // =================================================================
  // POST CARD — photo, story, or text. NO colour blocks, neutral.
  // Click → article page (or lightbox for video posts).
  // =================================================================
  function postCardHtml(post) {
    const open = post.type === 'text' || post.type === 'photo' || post.type === 'story' || post.type === 'mixed'
      ? 'navigateTo(\'post\', \'' + escapeJs(post.slug) + '\')'
      : 'openLightbox(\'' + escapeJs(post.heading) + '\')';

    if (post.type === 'text') {
      return [
        '<div class="post-card text-post" onclick="' + open + '">',
        '  <div class="text-body">',
        '    <span class="type-badge-static">READ</span>',
        '    <div class="h">' + escapeHtml(post.heading) + '</div>',
        '    <div class="excerpt">' + escapeHtml(post.excerpt) + '</div>',
        '    <div class="read">READ →</div>',
        '  </div>',
        '  <div class="meta-row">',
        '    <span class="author">' + escapeHtml(post.author_display) + '</span>',
        '    <span>' + escapeHtml(post.date_display) + '</span>',
        '  </div>',
        '</div>'
      ].join('');
    }

    // photo, story, mixed — all use a cover image
    const badge = post.type === 'photo'
      ? 'PHOTO' + (post.gallery_count ? ' <span class="count">+' + post.gallery_count + '</span>' : '')
      : post.type === 'story' ? 'STORY' + (post.gallery_count ? ' <span class="count">+' + post.gallery_count + '</span>' : '')
      : 'VIDEO';
    return [
      '<div class="post-card" onclick="' + open + '">',
      '  <div class="cover">',
      '    <span class="type-badge">' + badge + '</span>',
      '    <img src="' + (post.cover || 'https://picsum.photos/seed/' + post.slug + '/800/450') + '" alt="" loading="lazy">',
      (post.type === 'video' ? '<div class="play-marker"></div>' : ''),
      '    <div class="overlay">',
      '      <div class="h">' + escapeHtml(post.heading) + '</div>',
      '    </div>',
      '  </div>',
      '  <div class="meta-row">',
      '    <span class="author">' + escapeHtml(post.author_display) + '</span>',
      '    <span>' + escapeHtml(post.date_display) + '</span>',
      '  </div>',
      '</div>'
    ].join('');
  }


  // =================================================================
  // MODULE PAGE — semester + brick gallery for one module
  // =================================================================
  // Shared globe SVG used by link buttons across the site
  const linkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg>';

  function renderModule(mod) {
    if (LOAD_ERROR) {
      document.getElementById('app').innerHTML = '<div style="padding:120px 60px;text-align:center;font-family:var(--font-display);color:var(--ink-soft)"><div style="font-size:42px;font-weight:900;color:var(--ink);margin-bottom:18px;letter-spacing:-0.02em">Site data could not load.</div><div style="font-size:14px;font-family:var(--font-mono);color:var(--ink-mute);letter-spacing:0.1em">' + escapeHtml(LOAD_ERROR) + '</div>' + (LOAD_ERROR_WHERE ? '<div style="margin-top:14px;font-size:11px;font-family:var(--font-mono);color:var(--ink-faint);letter-spacing:0.1em;max-width:900px;margin-left:auto;margin-right:auto;word-break:break-all">' + escapeHtml(LOAD_ERROR_WHERE) + '</div>' : '') + '<div style="margin-top:30px;font-size:11px;font-family:var(--font-mono);color:var(--ink-mute);letter-spacing:0.16em;text-transform:uppercase">Check the Apps Script URL in index.html and the sheet permissions.</div></div>';
      return;
    }
    if (!SITE) {
      document.getElementById('app').innerHTML = '<div style="padding:160px 60px;text-align:center;font-family:var(--font-mono);color:var(--ink-mute);font-size:11px;letter-spacing:0.24em;text-transform:uppercase">Loading…</div>';
      return;
    }
    if (SITE && SITE.config) updateBrand(SITE.config);
    // Use full semesters[] if present; else fall back to single-semester from
    // featured+minis (home data, e.g. when a module has no full data yet).
    const useSems = Array.isArray(mod.semesters) && mod.semesters.length > 0;
    const semesters = useSems
      ? mod.semesters
      : [{ name: SITE.config.current_semester || '', tutor: mod.tutor || '',
           videos: [mod.featured].concat(mod.minis || []).filter(Boolean) }];

    // Total project count across all semesters (for the hero meta line)
    let totalProjects = 0;
    semesters.forEach(function(s) { totalProjects += (s.videos || []).length; });

    // Build a section per semester
    function semesterSectionHtml(sem, idx) {
      const semTutor = sem.tutor || mod.tutor || '';
      const semVideos = sem.videos || [];
      const heading = 'Best of <span class="accent">' + escapeHtml(sem.name) + '</span> with ' + escapeHtml(semTutor);
      return [
        '  <section class="semester-section">',
        '    <div class="sem-head">',
        '      <h2>' + heading + '</h2>',
        '      <div class="sem-meta">' + semVideos.length + ' projects</div>',
        '    </div>',
        '    <div class="masonry">',
        (semVideos.length === 0
          ? '<div style="padding:60px 0;color:var(--ink-mute);font-family:var(--font-mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase">No projects in this semester.</div>'
          : semVideos.map(function(v, i) {
            var vLink = v.link
              ? '<a class="link-btn" href="' + escapeAttr(v.link) + '" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="Visit project">' + linkSvg + '</a>'
              : '';
            return '<div class="masonry-card" style="--c:' + mod.color + '" onclick="openLightbox(\'' + escapeJs(v.youtube || '') + '\',\'' + escapeJs(v.student) + ' · ' + escapeJs(mod.display_name) + '\')">'
              + '<div class="v-thumb">'
              + vLink
              + '<img src="' + (v.thumb || 'https://picsum.photos/seed/' + i + '/800/450') + '" alt="" loading="lazy">'
              + '<div class="v-play"></div>'
              + '</div>'
              + '<div class="v-name">' + escapeHtml(v.student) + '</div>'
              + '</div>';
          }).join('')),
        '    </div>',
        '  </section>'
      ].join('');
    }

    document.getElementById('app').innerHTML = [
      '<div class="module-page">',
      '  <div class="module-nav-row">',
      '    <span class="back" onclick="navigateTo(\'home\')">← BACK TO HOME</span>',
      '    <div>' + escapeHtml(mod.display_name) + ' · ' + escapeHtml(mod.tutor) + '</div>',
      '  </div>',
      '  <div class="module-hero">',
      '    <div class="meta-line">' + cfgEscape('Module · ' + (mod.program || '')) + '</div>',
      '    <h1>' + escapeHtml(mod.display_name) + '</h1>',
      (mod.tagline ? '    <p class="module-tagline">' + escapeHtml(mod.tagline) + '</p>' : ''),
      '  </div>',
      semesters.map(semesterSectionHtml).join(''),
      '  <footer>',
      '    ' + escapeHtml(SITE.config.footer_text) + ' <span class="sep">|</span> <span class="contact">' + escapeHtml(SITE.config.footer_contact) + '</span>',
      '  </footer>',
      '</div>'
    ].join('');
  }

  // =================================================================
  // ARTICLE PAGE
  // =================================================================
  function renderArticle(post) {
    if (LOAD_ERROR) {
      document.getElementById('app').innerHTML = '<div style="padding:120px 60px;text-align:center;font-family:var(--font-display);color:var(--ink-soft)"><div style="font-size:42px;font-weight:900;color:var(--ink);margin-bottom:18px;letter-spacing:-0.02em">Site data could not load.</div><div style="font-size:14px;font-family:var(--font-mono);color:var(--ink-mute);letter-spacing:0.1em">' + escapeHtml(LOAD_ERROR) + '</div>' + (LOAD_ERROR_WHERE ? '<div style="margin-top:14px;font-size:11px;font-family:var(--font-mono);color:var(--ink-faint);letter-spacing:0.1em;max-width:900px;margin-left:auto;margin-right:auto;word-break:break-all">' + escapeHtml(LOAD_ERROR_WHERE) + '</div>' : '') + '<div style="margin-top:30px;font-size:11px;font-family:var(--font-mono);color:var(--ink-mute);letter-spacing:0.16em;text-transform:uppercase">Check the Apps Script URL in index.html and the sheet permissions.</div></div>';
      return;
    }
    if (!SITE) {
      document.getElementById('app').innerHTML = '<div style="padding:160px 60px;text-align:center;font-family:var(--font-mono);color:var(--ink-mute);font-size:11px;letter-spacing:0.24em;text-transform:uppercase">Loading…</div>';
      return;
    }
    if (SITE && SITE.config) updateBrand(SITE.config);
    const dateFull = new Date(post.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    const readTime = Math.max(1, Math.ceil((post.body || '').split(/\s+/).length / 200));
    // Park the gallery array on window so the inline onclick can read it
    if (post.gallery && post.gallery.length) window._currentGallery = post.gallery;
    const galleryHtml = post.gallery && post.gallery.length
      ? '<div class="article-gallery">'
        + '<h3>Gallery</h3>'
        + '<div class="gallery-grid">'
        + post.gallery.map((src, i) => '<div class="gi" onclick="openCarousel(window._currentGallery, ' + i + ')"><img src="' + src + '" alt="" loading="lazy"></div>').join('')
        + '</div></div>'
      : '';

    document.getElementById('app').innerHTML = [
      '<div class="article-shell">',
      '  <div class="article-nav">',
      '    <span class="back" onclick="navigateTo(\'home\')">← BACK TO ALL POSTS</span>',
      '    <div>' + escapeHtml(post.meta_line || (post.module + ' · ' + dateFull.toUpperCase())) + '</div>',
      '  </div>',
      post.cover
        ? '<div class="article-cover"><img src="' + post.cover + '" alt=""></div>'
        : '',
      '  <div class="article-head">',
      '    <div class="meta-line">' + escapeHtml(post.meta_line || (post.type.toUpperCase() + ' · ' + post.module)) + '</div>',
      '    <h1>' + escapeHtml(post.heading) + '</h1>',
      '    <span class="accent-line"></span>',
      '    <div class="byline">by <strong>' + escapeHtml(post.author_display) + '</strong> · ' + dateFull + ' · ' + readTime + ' min read</div>',
      '  </div>',
      '  <div class="article-body">',
      '    <div class="body-inner">',
      renderMarkdown(post.body || ''),
      '    </div>',
      '  </div>',
      galleryHtml,
      '  <div class="article-foot">',
      '    <a onclick="navigateTo(\'home\')">← ALL POSTS</a>',
      '  </div>',
      '  <footer>',
      '    ' + escapeHtml(SITE.config.footer_text) + ' <span class="sep">|</span> <span class="contact">' + escapeHtml(SITE.config.footer_contact) + '</span>',
      '  </footer>',
      '</div>'
    ].join('');
  }

  // =================================================================
  // MARKDOWN — minimal subset (bold, italic, links, lists, paragraphs)
  // =================================================================
  function renderMarkdown(text) {
    if (!text) return '';
    const paragraphs = text.split(/\n\n+/);
    return paragraphs.map(para => {
      const trimmed = para.trim();
      if (!trimmed) return '';
      // Detect a bullet list
      if (/^- /m.test(trimmed) && trimmed.split('\n').every(line => /^- /.test(line.trim()))) {
        const items = trimmed.split('\n').map(l => '<li>' + markdownInline(l.replace(/^- /, '').trim()) + '</li>').join('');
        return '<ul>' + items + '</ul>';
      }
      return '<p>' + markdownInline(trimmed.replace(/\n/g, '<br>')) + '</p>';
    }).join('');
  }
  function markdownInline(text) {
    if (!text) return '';
    let s = escapeHtml(text);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return s;
  }

  // =================================================================
  // LIGHTBOX (simple placeholder for video/image)
  // =================================================================
  // Carousel state — used when viewing an article gallery's images
  let carouselImages = [];
  let carouselIndex = 0;

  function openLightbox(videoUrl, caption) {
    document.getElementById('lightbox').classList.remove('carousel-mode');
    var host = document.getElementById('lb-host');
    var url = String(videoUrl || '').trim();
    if (!url) {
      host.innerHTML = '<div style="color:#fff;padding:40px;font-family:var(--font-display);font-size:18px;opacity:0.7">No video URL available</div>';
    } else {
      // Normalise: accept watch?v= or youtu.be or embed/, always emit /embed/
      var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|watch\?v=|.*[?&]v=))([\w-]{11})/);
      var id = m ? m[1] : (url.length === 11 ? url : '');
      var iframeStyle = "position:absolute;top:0;left:0;width:100%;height:100%;border:0";
      // Mobile browsers (esp. iOS Safari) block autoplay with sound.
      // On desktop we keep sound on so playback is normal.
      var isMobile = window.matchMedia('(max-width: 900px)').matches
                    || (('ontouchstart' in window) && navigator.maxTouchPoints > 0)
                    || /iPhone|iPad|Android|Mobi/i.test(navigator.userAgent);
      var muteParam = isMobile ? '&mute=1&playsinline=1' : '';
      if (id) {
        host.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id
          + '?autoplay=1' + muteParam + '&rel=0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen frameborder="0" style="' + iframeStyle + '"></iframe>';
      } else {
        host.innerHTML = '<iframe src="' + url + '" allow="autoplay; fullscreen" allowfullscreen frameborder="0" style="' + iframeStyle + ';background:#000"></iframe>';
      }
    }
    document.getElementById('lb-caption').textContent = caption || '';
    document.getElementById('lightbox').classList.add('open');
  }

  function openCarousel(images, startIndex) {
    carouselImages = images;
    carouselIndex = startIndex || 0;
    const lb = document.getElementById('lightbox');
    lb.classList.add('carousel-mode');
    lb.classList.add('open');
    renderCarouselImage();
  }

  function renderCarouselImage() {
    const src = carouselImages[carouselIndex];
    document.getElementById('lb-host').innerHTML = '<img src="' + src + '" alt="">';
    document.getElementById('lb-caption').textContent =
      (carouselIndex + 1) + ' / ' + carouselImages.length;
  }

  function carouselPrev(e) {
    if (e) e.stopPropagation();
    if (!carouselImages.length) return;
    carouselIndex = (carouselIndex - 1 + carouselImages.length) % carouselImages.length;
    renderCarouselImage();
  }

  function carouselNext(e) {
    if (e) e.stopPropagation();
    if (!carouselImages.length) return;
    carouselIndex = (carouselIndex + 1) % carouselImages.length;
    renderCarouselImage();
  }

  function closeLightbox(event) {
    if (event) event.stopPropagation();
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    lb.classList.remove('carousel-mode');
    document.getElementById('lb-host').innerHTML = '';
    carouselImages = []; carouselIndex = 0;
  }

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft' && lb.classList.contains('carousel-mode')) carouselPrev();
    else if (e.key === 'ArrowRight' && lb.classList.contains('carousel-mode')) carouselNext();
  });

  // =================================================================
  // ESCAPE HELPERS
  // =================================================================
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
    );
  }
  function escapeAttr(s) {
    return escapeHtml(String(s == null ? '' : s).replace(/[\r\n\t]+/g, ' ').trim());
  }
  function escapeJs(s) {
    return String(s == null ? '' : s)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\t/g, '\\t');
  }

  // Scroll-top fab visibility — show after 50% of viewport scrolled
  (function setupScrollTopFab() {
    const fab = document.getElementById('scroll-top-fab');
    if (!fab) return;
    function update() {
      const halfway = window.innerHeight * 0.5;
      if (window.scrollY > halfway) fab.classList.add('visible');
      else fab.classList.remove('visible');
    }
    window.addEventListener('scroll', update, { passive: true });
    update();
  })();

  // Boot — fetch sheet data then render
  loadSiteData();
</script>
